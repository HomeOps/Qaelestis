substitutions:
  name: "calestis-water-level"
  friendly_name: Calestis Water Level

  # Tank calibration — set after install. Values in millimetres.
  #
  # d_empty: distance from sensor face to the BOTTOM of the tank
  #          (i.e. the reading you would see if the tank were drained).
  # d_full:  distance from sensor face to the MAXIMUM water level
  #          (i.e. the reading you would see at "full"; must be >= 300 mm).
  #
  # The defaults below are placeholders; override per tank.
  d_empty: "2000"
  d_full: "400"

  # MB7851 analog scaling at Vcc = 3.3 V.
  # distance_mm = V_AN * (5120 / 3.3) = V_AN * 1551.515
  mm_per_volt: "1551.515"

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_fallback_password

captive_portal:

# Built-in WS2812 RGB LED on GPIO 27 — used as connection-status LED.
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    rmt_channel: 0
    default_transition_length: 0s

# Built-in front button on GPIO 39 (active-low). Useful for a manual
# "force a reading now" or for diagnostics.
binary_sensor:
  - platform: gpio
    id: atom_button
    name: "Atom Button"
    pin:
      number: GPIO39
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - component.update: adc_voltage

sensor:
  # Raw analog voltage on G33 (ADC1_CH5).
  # Hidden internal sensor — feeds the distance template below.
  - platform: adc
    id: adc_voltage
    pin: GPIO33
    attenuation: 12db
    update_interval: 30s
    accuracy_decimals: 4
    internal: true
    filters:
      # Median across 7 samples and emit every 4th — knocks out the
      # occasional bad ping without lagging the reading too much.
      - median:
          window_size: 7
          send_every: 4
          send_first_at: 1

  # Distance from the sensor face to the water surface, in millimetres.
  - platform: template
    id: distance_mm
    name: "Water Distance"
    unit_of_measurement: "mm"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      float v = id(adc_voltage).state;
      if (isnan(v)) return NAN;
      return v * ${mm_per_volt};

  # Water column height in millimetres (D_empty - distance).
  - platform: template
    id: water_height_mm
    name: "Water Height"
    unit_of_measurement: "mm"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      float d = id(distance_mm).state;
      if (isnan(d)) return NAN;
      float h = ${d_empty} - d;
      if (h < 0) h = 0;
      return h;

  # Tank fill percentage, clamped 0–100.
  - platform: template
    id: water_percent
    name: "Water Level"
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    icon: "mdi:water-percent"
    lambda: |-
      float d = id(distance_mm).state;
      if (isnan(d)) return NAN;
      float span = ${d_empty} - ${d_full};
      if (span <= 0) return NAN;
      float p = ((${d_empty} - d) / span) * 100.0f;
      if (p < 0)   p = 0;
      if (p > 100) p = 100;
      return p;

  # Wi-Fi signal strength, useful when the sensor is far from the AP.
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Wi-Fi SSID"
